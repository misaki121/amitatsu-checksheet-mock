<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>管理画面：マスタ管理 モック</title>
<link rel="stylesheet" href="_theme.css">
<style>
  body{font-size:13.5px;}
  .topbar{background:var(--accent);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
  .topbar .title{font-weight:700;font-size:16px;}
  .topbar nav a{color:#fff;text-decoration:none;margin-left:18px;font-size:13px;opacity:.9;}
  .topbar nav a.active{font-weight:700;opacity:1;border-bottom:2px solid #fff;padding-bottom:4px;}
  .topbar .logout{background:rgba(255,255,255,.15);padding:5px 12px;border-radius:4px;font-size:12px;}
  .container{padding:20px;max-width:1080px;margin:0 auto;}

  .tabs{display:flex;gap:2px;margin-bottom:0;border-bottom:1px solid var(--line);}
  .tabs a{padding:10px 18px;background:#EFE3D2;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--line);border-bottom:none;border-radius:6px 6px 0 0;}
  .tabs a.active{background:var(--bg-card);color:var(--accent);font-weight:700;}

  .panel{background:var(--bg-card);border:1px solid var(--line);border-top:none;border-radius:0 0 8px 8px;padding:18px;}
  .panel h2{margin:0 0 8px;font-size:15px;color:var(--accent);}
  .panel .desc{font-size:12px;color:var(--muted);margin-bottom:14px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#EFE3D2;padding:8px 10px;text-align:left;font-weight:700;font-size:12px;border-bottom:1px solid var(--line);}
  td{padding:6px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td input[type=text]{width:200px;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font-size:13px;}
  td input[type=number]{width:60px;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font-size:13px;}
  td.center{text-align:center;}
  td.hidden-row{background:#F2EAE0;color:var(--muted);}
  td.hidden-row input{color:var(--muted);}
  .badge-hidden{display:inline-block;background:#A0522D;color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;margin-left:6px;}

  .add-row{margin-top:10px;display:flex;gap:8px;align-items:center;}
  .add-row input{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;width:220px;}
  .btn{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:400;}
  .btn.danger{background:#fff;color:var(--accent);border:1px solid var(--accent);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .save-bar{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:flex;justify-content:flex-end;gap:8px;align-items:center;}
  .save-bar .modified{color:var(--accent);font-size:12px;margin-right:auto;}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">船長チェックシート 管理画面</div>
  <nav>
    <a href="admin-list.html">提出一覧</a>
    <a href="admin-master.html" class="active">マスタ管理</a>
  </nav>
  <a class="logout" href="login.html" style="text-decoration:none;color:#fff;">ログアウト</a>
</div>

<div class="container">

  <div class="tabs">
    <a href="#" class="active">新人船長</a>
    <a href="#">船名</a>
    <a href="#">桟橋</a>
    <a href="#">評価担当</a>
  </div>

  <div class="panel">
    <h2>新人船長マスタ</h2>
    <div class="desc">フォームの「新人船長」プルダウン（評価される人）に表示される選択肢です。退職等で表示したくない場合は「非表示」にチェックを入れてください。過去の評価レコードはそのまま残ります。</div>

    <table>
      <thead>
        <tr>
          <th style="width:60px;">並び順</th>
          <th>名前</th>
          <th style="width:90px;" class="center">非表示</th>
          <th style="width:90px;" class="center">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr><td><input type="number" value="1"></td><td><input type="text" value="飯野"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="2"></td><td><input type="text" value="古村"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="3"></td><td><input type="text" value="小川"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="4"></td><td><input type="text" value="木山"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="5"></td><td><input type="text" value="藤田"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="6"></td><td><input type="text" value="翔"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="7"></td><td><input type="text" value="長谷川"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr><td><input type="number" value="8"></td><td><input type="text" value="宮田"></td><td class="center"><input type="checkbox"></td><td class="center"><button class="btn danger">削除</button></td></tr>
        <tr class="hidden-row"><td class="hidden-row"><input type="number" value="99"></td><td class="hidden-row"><input type="text" value="（退職）山田"><span class="badge-hidden">非表示</span></td><td class="hidden-row center"><input type="checkbox" checked></td><td class="hidden-row center"><button class="btn danger">削除</button></td></tr>
      </tbody>
    </table>

    <div class="add-row">
      <input type="text" placeholder="新人船長の名前を入力">
      <button class="btn">＋ 追加</button>
    </div>

    <div class="save-bar">
      <span class="modified">● 変更あり（保存していません）</span>
      <button class="btn ghost">キャンセル</button>
      <button class="btn">変更を保存</button>
    </div>
  </div>

  <div style="margin-top:18px;padding:12px 14px;background:#FBF5EC;border:1px solid var(--line);border-radius:6px;font-size:12px;color:var(--hint-text);">
    💡 ヒント：「削除」と「非表示」の違い<br>
    ・<strong>非表示</strong>：プルダウンから消えるが、過去の評価データの名前はそのまま残ります（退職者向け推奨）。<br>
    ・<strong>削除</strong>：完全に消えます。誤入力の修正時のみ使ってください。
  </div>

</div>
</body>
</html>
