<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>管理画面ログイン モック</title>
<link rel="stylesheet" href="_theme.css">
<style>
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .brand{color:var(--muted);font-size:13px;letter-spacing:.1em;margin-bottom:6px;}
  h1{color:var(--accent);font-size:24px;margin:0 0 28px;letter-spacing:.05em;}
  .card{background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:32px 36px;width:380px;box-shadow:0 6px 24px rgba(139,46,46,.08);}
  .card .label{font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;}
  .card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#fff;color:var(--ink);}
  .card input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .card .hint{font-size:11px;color:var(--muted);margin-top:8px;}
  .card button{margin-top:20px;width:100%;background:var(--accent);color:#fff;border:none;padding:12px 0;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;}
  .card button:hover{background:var(--accent-soft);}
  .err{display:none;margin-top:14px;padding:8px 12px;background:#fef0f0;color:var(--accent);border:1px solid var(--accent);border-radius:6px;font-size:13px;}
  .footer{margin-top:24px;font-size:11px;color:var(--muted);text-align:center;}
  .footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>

<div class="brand">AMITATSU / 屋形船あみ達</div>
<h1>船長チェックシート 管理画面</h1>

<div class="card">
  <div class="label">管理画面パスワード</div>
  <input type="password" id="pw" placeholder="" autocomplete="off">
  <div class="hint">※ パスワードが分からない方は管理者にお問い合わせください</div>
  <button onclick="login()">ログイン</button>
  <div class="err" id="err">パスワードが違います</div>
</div>

<div class="footer">
  <a href="index.html">← モック一覧に戻る</a>
</div>

<script>
  function login(){
    // モック：何でも入れたらログイン成功で admin-list.html へ
    const pw = document.getElementById('pw').value;
    if(!pw){
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'パスワードを入力してください';
      return;
    }
    location.href = 'admin-list.html';
  }
  document.getElementById('pw').addEventListener('keydown', e => {
    if(e.key === 'Enter') login();
  });
</script>
</body>
</html>
